<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍎🔫🚜 ПИКСЕЛЬ-АРКАДА · три в одном</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1b2a2f;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* главная карточка — репозиторий игр */
        .game-hub {
            max-width: 1300px;
            width: 100%;
            background: #2a3b44;
            border-radius: 4rem 4rem 3rem 3rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 30px 35px #0e1a1f, inset 0 -5px 10px #1e2f38;
            border: 4px solid #9da9bb;
        }

        .hub-title {
            text-align: center;
            font-size: 3rem;
            font-weight: bold;
            color: #fdebb3;
            text-shadow: 0 5px 0 #5d4a2c, 0 8px 10px black;
            letter-spacing: 5px;
            margin-bottom: 1.5rem;
            word-break: break-word;
        }

        .hub-tabs {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 2.8rem;
        }

        .tab-btn {
            background: #4a6172;
            border: none;
            color: #fcf0d5;
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            font-weight: bold;
            padding: 1rem 2.5rem;
            border-radius: 5rem;
            box-shadow: 0 8px 0 #26323d, 0 10px 20px #0f181f;
            cursor: pointer;
            transition: 0.08s linear;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid #b8c7dd;
        }

        .tab-btn.active {
            background: #f5c27b;
            color: #1f2d25;
            box-shadow: 0 4px 0 #a06d3a, 0 12px 20px #2d2418;
            transform: translateY(4px);
            border-color: #ffddb0;
        }

        .game-container {
            background: #1d2c34;
            border-radius: 3.5rem;
            padding: 2.2rem 1.8rem;
            border: 5px solid #8d9bb8;
            box-shadow: inset 0 -5px 0 #101c23, 0 20px 25px #091013;
            transition: 0.2s ease;
        }

        /* универсальный враппер для каждой игры (будем переключать видимость) */
        .game-panel {
            display: none;
            opacity: 0;
            transition: opacity 0.25s;
        }

        .game-panel.active-panel {
            display: block;
            opacity: 1;
        }

        /* встроенные стили игр (адаптированы чтобы не ломать сетку) */
        /* ---- shooter ---- */
        .shooter-wrapper, .knife-wrapper, .farm-wrapper {
            background: transparent;
            box-shadow: none;
            padding: 0;
        }

        .pixel-canvas, .knife-canvas, .farm-canvas {
            display: block;
            margin: 0 auto;
            image-rendering: pixelated;
            border-radius: 2.5rem;
            box-shadow: 0 0 0 5px #7c8baa, 0 15px 20px black;
        }

        .info-panel, .stats-row, .resources {
            background: #1f2e3c;
            border: 3px solid #7f9bc0;
            border-radius: 3rem;
            padding: 1rem 2rem;
        }

        .button-pixel, .button-hit, .farm-btn {
            font-size: 1.5rem;
            padding: 0.8rem 1.5rem;
        }

        /* фикс для вкладок, чтоб канвасы не сжимались */
        canvas {
            max-width: 100%;
            height: auto;
        }

        .footer-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
            color: #bdd3f0;
            font-size: 1.4rem;
            border-top: 2px dashed #7f8fa0;
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>
<div class="game-hub">
    <div class="hub-title">◈ PIXEL REPOSITORY ◈</div>

    <!-- вкладки-переключатели -->
    <div class="hub-tabs">
        <button class="tab-btn active" data-game="shooter">🔫 шутер</button>
        <button class="tab-btn" data-game="knife">🍎 knife hit</button>
        <button class="tab-btn" data-game="farm">🚜 ферма</button>
    </div>

    <!-- КОНТЕЙНЕР ИГРЫ 1: ШУТЕР -->
    <div id="game-shooter" class="game-container game-panel active-panel">
        <div class="shooter-wrapper">
            <div style="display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center;">
                <canvas id="shooterCanvas" class="pixel-canvas" width="600" height="400"></canvas>
                <div class="info-panel" style="min-width: 220px;">
                    <div class="info-row" style="display: flex; justify-content: space-between;">
                        <span>🔫 ПАТРОНЫ</span>
                        <span id="ammoCounter">12</span>
                    </div>
                    <div class="progress-bar" style="background:#1e253b; height:1.2rem; border-radius:2rem;">
                        <div id="rechargeProgress" class="progress-fill" style="width:100%; height:100%; background:#f27d5c;"></div>
                    </div>
                    <div class="info-row" style="display: flex; justify-content: space-between; margin-top:1rem;">
                        <span>🎯 СЧЁТ</span>
                        <span id="scoreDisplay">0</span>
                    </div>
                    <div id="hpContainer" class="hp-bar" style="display:flex; gap:5px; margin:1rem 0;">
                        <div class="hp-unit active" style="width:20px; height:20px; background:#f25c5c;"></div>
                        <div class="hp-unit active" style="width:20px; height:20px; background:#f25c5c;"></div>
                        <div class="hp-unit active" style="width:20px; height:20px; background:#f25c5c;"></div>
                    </div>
                    <div class="shoot-zone" style="text-align:center;">⚡ ЛКМ / ПРОБЕЛ</div>
                    <button class="button-pixel" id="restartShooter" style="width:100%;">НОВАЯ ИГРА</button>
                </div>
            </div>
        </div>
    </div>

    <!-- КОНТЕЙНЕР ИГРЫ 2: KNIFE HIT (ЯБЛОЧКО) -->
    <div id="game-knife" class="game-container game-panel">
        <div class="knife-wrapper" style="text-align:center;">
            <canvas id="knifeCanvas" class="knife-canvas" width="450" height="450"></canvas>
            <div class="stats-row" style="display:flex; justify-content:space-between; margin:1.5rem 0 1rem; padding:1rem 2rem;">
                <span>🍎 яблоки</span>
                <span id="appleScore">0</span>
            </div>
            <div style="display:flex; gap:2rem; justify-content:center; align-items:center;">
                <button class="button-hit" id="throwBtn">🗡️ БРОСОК</button>
                <div class="knives-left" id="knifeCountDisplay" style="background:#291f12; border-radius:3rem; padding:0.5rem 2rem;">5</div>
            </div>
            <div style="margin-top:1rem; color:#beb482;">🔹 двойной клик по полю = рестарт</div>
        </div>
    </div>

    <!-- КОНТЕЙНЕР ИГРЫ 3: ФЕРМА -->
    <div id="game-farm" class="game-container game-panel">
        <div class="farm-wrapper" style="text-align:center;">
            <canvas id="farmCanvas" class="farm-canvas" width="550" height="350"></canvas>
            <div class="resources" style="display:flex; justify-content:space-around; margin:1.5rem 0; padding:1rem;">
                <div><span>🌽 зерно</span> <span id="grainValue">20</span></div>
                <div><span>🥕 морковь</span> <span id="carrotValue">12</span></div>
                <div><span>⭐ звёзды</span> <span id="starValue">0</span></div>
            </div>
            <div style="display:flex; gap:1rem; flex-wrap:wrap; justify-content:center;">
                <button class="farm-btn" id="plantGrain">🌱 посадить зерно</button>
                <button class="farm-btn" id="plantCarrot">🌿 посадить морковь</button>
                <button class="farm-btn" id="collectBtn">🧺 собрать всё</button>
            </div>
            <div style="margin-top:1.2rem;">
                <span class="seed-counter" id="seasonDisplay" style="background:#352d1a; padding:0.6rem 2rem; border-radius:3rem;">🍂 осень</span>
            </div>
        </div>
    </div>

    <!-- нижний колонтитул репозитория -->
    <div class="footer-nav">
        <span>⚡ 3 games – один репозиторий</span>
        <span>🖱️ кликай по вкладкам</span>
    </div>
</div>

<!-- ОДИН ОБЩИЙ СКРИПТ, ИНИЦИАЛИЗИРУЮЩИЙ ВСЕ ИГРЫ И ПЕРЕКЛЮЧЕНИЕ -->
<script>
(function() {
    // ================== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==================
    const tabs = document.querySelectorAll('.tab-btn');
    const panels = {
        shooter: document.getElementById('game-shooter'),
        knife: document.getElementById('game-knife'),
        farm: document.getElementById('game-farm')
    };

    function setActiveGame(gameId) {
        // деактивируем все кнопки и панели
        tabs.forEach(t => t.classList.remove('active'));
        Object.values(panels).forEach(p => p.classList.remove('active-panel'));

        // активируем нужные
        document.querySelector(`.tab-btn[data-game="${gameId}"]`).classList.add('active');
        panels[gameId].classList.add('active-panel');
    }

    tabs.forEach(tab => {
        tab.addEventListener('click', (e) => {
            const game = tab.dataset.game;
            setActiveGame(game);
        });
    });

    // ================== ИНИЦИАЛИЗАЦИЯ ИГР ==================
    // ----- ШУТЕР (shooter) -----
    (function initShooter() {
        const canvas = document.getElementById('shooterCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        const W = 600, H = 400;

        // элементы
        const ammoSpan = document.getElementById('ammoCounter');
        const scoreSpan = document.getElementById('scoreDisplay');
        const rechargeFill = document.getElementById('rechargeProgress');
        const hpUnits = document.querySelectorAll('#hpContainer .hp-unit');
        const restartBtn = document.getElementById('restartShooter');

        let score = 0, health = 3, ammo = 12, maxAmmo = 12;
        let reloadTimer = 0;
        const RELOAD_TIME = 45;
        let enemies = [];
        let bullets = [];
        const ENEMY_RADIUS = 20, ENEMY_SPEED = 1.4, BULLET_SPEED = 6;
        let mouseX = W/2, mouseY = H/2, mouseInside = false;
        let gameOver = false;

        function spawnEnemy() {
            let side = Math.floor(Math.random() * 4);
            let x, y;
            const pad = 30;
            if (side === 0) { x = -ENEMY_RADIUS - 2; y = Math.random() * (H - 2*ENEMY_RADIUS) + ENEMY_RADIUS; }
            else if (side === 1) { x = W + ENEMY_RADIUS + 2; y = Math.random() * (H - 2*ENEMY_RADIUS) + ENEMY_RADIUS; }
            else if (side === 2) { x = Math.random() * (W - 2*ENEMY_RADIUS) + ENEMY_RADIUS; y = -ENEMY_RADIUS - 2; }
            else { x = Math.random() * (W - 2*ENEMY_RADIUS) + ENEMY_RADIUS; y = H + ENEMY_RADIUS + 2; }
            enemies.push({ x, y, hp:1 });
        }

        function updateUI() {
            ammoSpan.textContent = ammo;
            scoreSpan.textContent = score;
            if (reloadTimer > 0) {
                let percent = ((RELOAD_TIME - reloadTimer) / RELOAD_TIME) * 100;
                rechargeFill.style.width = percent + '%';
            } else { rechargeFill.style.width = '100%'; }
            hpUnits.forEach((unit, idx) => {
                if (idx < health) unit.style.background = '#f25c5c';
                else unit.style.background = '#aa4a4a';
            });
        }

        function shootAt(tx, ty) {
            if (gameOver || ammo <=0 || reloadTimer > 0) return;
            ammo--;
            bullets.push({ x:W/2, y:H/2, vx:(tx - W/2)*0.018, vy:(ty - H/2)*0.018 });
            reloadTimer = RELOAD_TIME;
            updateUI();
        }

        function resetShooter() {
            score = 0; health = 3; ammo = maxAmmo; reloadTimer = 0; enemies = []; bullets = []; gameOver = false;
            for (let i=0;i<3;i++) spawnEnemy();
            updateUI();
        }

        function updateGame() {
            if (gameOver) return;
            if (reloadTimer > 0) reloadTimer--;

            for (let i=bullets.length-1; i>=0; i--) {
                let b = bullets[i];
                b.x += b.vx; b.y += b.vy;
                for (let j=enemies.length-1; j>=0; j--) {
                    let e = enemies[j];
                    const dx = b.x - e.x, dy = b.y - e.y;
                    if (Math.sqrt(dx*dx+dy*dy) < ENEMY_RADIUS+4) {
                        bullets.splice(i,1); enemies.splice(j,1);
                        score += 10; spawnEnemy(); break;
                    }
                }
            }
            for (let e of enemies) {
                const dx = W/2 - e.x, dy = H/2 - e.y;
                const len = Math.sqrt(dx*dx+dy*dy);
                if (len>0.1) { e.x += (dx/len)*ENEMY_SPEED; e.y += (dy/len)*ENEMY_SPEED; }
                if (Math.sqrt((e.x-W/2)**2 + (e.y-H/2)**2) < ENEMY_RADIUS+10) {
                    health--; enemies = enemies.filter(en => en !== e); spawnEnemy();
                    if (health<=0) { health=0; gameOver=true; }
                    updateUI(); if(gameOver) break;
                }
            }
            bullets = bullets.filter(b => b.x > -50 && b.x < W+50 && b.y > -50 && b.y < H+50);
            if (Math.random()<0.008 && enemies.length<8) spawnEnemy();
            updateUI();
        }

        function draw() {
            ctx.clearRect(0,0,W,H);
            ctx.fillStyle = '#1b212f'; ctx.fillRect(0,0,W,H);
            ctx.strokeStyle = '#28324b'; ctx.lineWidth=2;
            for (let i=0;i<W;i+=30) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
            for (let i=0;i<H;i+=30) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke(); }
            ctx.fillStyle = '#7c98d9'; ctx.beginPath(); ctx.arc(W/2,H/2,18,0,2*Math.PI); ctx.fill();
            ctx.fillStyle = '#3b4f87'; ctx.beginPath(); ctx.arc(W/2,H/2,12,0,2*Math.PI); ctx.fill();
            ctx.fillStyle = '#f5cb8b'; ctx.beginPath(); ctx.arc(W/2,H/2,6,0,2*Math.PI); ctx.fill();
            enemies.forEach(e => {
                ctx.fillStyle = '#d64949'; ctx.beginPath(); ctx.arc(e.x,e.y,ENEMY_RADIUS-2,0,2*Math.PI); ctx.fill();
                ctx.fillStyle = '#a12424'; ctx.beginPath(); ctx.arc(e.x-4,e.y-4,5,0,2*Math.PI); ctx.fill();
                ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(e.x-7,e.y-8,3,0,2*Math.PI); ctx.fill();
                ctx.fillStyle = '#172028'; ctx.beginPath(); ctx.arc(e.x-8,e.y-9,1.5,0,2*Math.PI); ctx.fill();
            });
            bullets.forEach(b => { ctx.fillStyle = '#ffe484'; ctx.fillRect(b.x-3,b.y-3,6,6); });
            if (mouseInside && !gameOver) {
                ctx.strokeStyle = '#d6e8ff'; ctx.lineWidth=3;
                ctx.beginPath(); ctx.moveTo(mouseX-15,mouseY-15); ctx.lineTo(mouseX-5,mouseY-5);
                ctx.moveTo(mouseX+15,mouseY-15); ctx.lineTo(mouseX+5,mouseY-5);
                ctx.moveTo(mouseX+15,mouseY+15); ctx.lineTo(mouseX+5,mouseY+5);
                ctx.moveTo(mouseX-15,mouseY+15); ctx.lineTo(mouseX-5,mouseY+5); ctx.stroke();
            }
            if (gameOver) {
                ctx.fillStyle = '#220000aa'; ctx.fillRect(0,0,W,H);
                ctx.fillStyle = '#ffb69b'; ctx.font = 'bold 32px "Courier New"'; ctx.textAlign='center';
                ctx.fillText('GAME OVER', W/2, H/2-20);
            }
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
            mouseX = (e.clientX - rect.left)*scaleX; mouseY = (e.clientY - rect.top)*scaleY;
            mouseX = Math.min(W-5, Math.max(5, mouseX)); mouseY = Math.min(H-5, Math.max(5, mouseY));
            mouseInside = true;
        });
        canvas.addEventListener('mouseleave', () => mouseInside = false);
        canvas.addEventListener('click', (e) => { e.preventDefault(); if (mouseInside) shootAt(mouseX, mouseY); });
        window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.key === ' ') { e.preventDefault(); if (mouseInside) shootAt(mouseX, mouseY); } });
        restartBtn.addEventListener('click', resetShooter);

        resetShooter();
        function shooterLoop() { if (!gameOver) updateGame(); draw(); requestAnimationFrame(shooterLoop); }
        shooterLoop();
    })();

    // ----- KNIFE HIT (яблочко) -----
    (function initKnife() {
        const canvas = document.getElementById('knifeCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d'); ctx.imageSmoothingEnabled=false;
        const W=450, H=450, cx=W/2, cy=H/2;
        let apples = [], knives = [], thrownKnife = null, knifeCount = 5, appleScore = 0, gameOver = false;
        let spinSpeed = 0.015;

        function spawnApple() { apples.push({ angle: Math.random()*2*Math.PI, radius: 120+Math.random()*40, spin: 0.01+Math.random()*0.025, hitCount:0 }); }
        function updateUI() { document.getElementById('appleScore').textContent = appleScore; document.getElementById('knifeCountDisplay').textContent = knifeCount; }
        function restartKnife() { apples = []; knives = []; thrownKnife = null; knifeCount = 5; appleScore = 0; gameOver = false; for (let i=0;i<2;i++) spawnApple(); updateUI(); }

        function throwK() {
            if (gameOver || knifeCount<=0 || thrownKnife) return;
            knifeCount--; thrownKnife = { angle: Math.atan2(cy-10, cx-10), distance: 150, speed: 3.5 }; updateUI();
        }

        function updateKnife() {
            if (gameOver) return;
            for (let a of apples) a.angle += a.spin;
            if (thrownKnife) {
                thrownKnife.distance -= thrownKnife.speed;
                let kx = cx + thrownKnife.distance * Math.cos(thrownKnife.angle);
                let ky = cy + thrownKnife.distance * Math.sin(thrownKnife.angle);
                for (let i=0; i<apples.length; i++) {
                    let a = apples[i];
                    let ax = cx + a.radius * Math.cos(a.angle);
                    let ay = cy + a.radius * Math.sin(a.angle);
                    if (Math.sqrt((kx-ax)**2 + (ky-ay)**2) < 25) {
                        apples.splice(i,1); appleScore+=10; spawnApple();
                        knives.push({ angle: thrownKnife.angle, distance: thrownKnife.distance });
                        thrownKnife = null; updateUI(); return;
                    }
                }
                for (let k of knives) {
                    let kx2 = cx + k.distance * Math.cos(k.angle);
                    let ky2 = cy + k.distance * Math.sin(k.angle);
                    if (Math.sqrt((kx-kx2)**2 + (ky-ky2)**2) < 12) { gameOver = true; thrownKnife = null; return; }
                }
                if (thrownKnife && thrownKnife.distance < 40) {
                    knives.push({ angle: thrownKnife.angle, distance: thrownKnife.distance });
                    thrownKnife = null;
                }
            }
        }

        function drawKnife() {
            ctx.clearRect(0,0,W,H);
            ctx.fillStyle='#2d4d3c'; ctx.fillRect(0,0,W,H);
            ctx.fillStyle='#936e45'; ctx.beginPath(); ctx.arc(cx,cy,210,0,2*Math.PI); ctx.fill();
            ctx.fillStyle='#6b4f31'; ctx.beginPath(); ctx.arc(cx,cy,190,0,2*Math.PI); ctx.fill();
            ctx.fillStyle='#3f2f1e'; ctx.beginPath(); ctx.arc(cx,cy,50,0,2*Math.PI); ctx.fill();
            apples.forEach(a => {
                let x = cx + a.radius*Math.cos(a.angle), y = cy + a.radius*Math.sin(a.angle);
                ctx.fillStyle='#e04e4e'; ctx.beginPath(); ctx.arc(x,y,24,0,2*Math.PI); ctx.fill();
                ctx.fillStyle='#ba2b2b'; ctx.beginPath(); ctx.arc(x-5,y-5,10,0,2*Math.PI); ctx.fill();
                ctx.fillStyle='#5f9f4b'; ctx.beginPath(); ctx.ellipse(x+6,y-18,5,8,0.2,0,2*Math.PI); ctx.fill();
            });
            knives.forEach(k => {
                let x = cx + k.distance*Math.cos(k.angle), y = cy + k.distance*Math.sin(k.angle);
                ctx.fillStyle='#c0c0c0'; ctx.fillRect(x-2,y-15,5,30);
                ctx.fillStyle='#e8e8e8'; ctx.fillRect(x-5,y-20,10,8);
            });
            if (thrownKnife) {
                let x = cx + thrownKnife.distance*Math.cos(thrownKnife.angle), y = cy + thrownKnife.distance*Math.sin(thrownKnife.angle);
                ctx.fillStyle='#ffffb0'; ctx.fillRect(x-3,y-18,6,35);
                ctx.fillStyle='gold'; ctx.fillRect(x-6,y-24,12,10);
            }
            if (gameOver) {
                ctx.fillStyle='#000000aa'; ctx.fillRect(0,0,W,H);
                ctx.fillStyle='#dbb47a'; ctx.font='bold 30px "Courier New"'; ctx.textAlign='center';
                ctx.fillText('ХРУСЬ!', cx, cy-30);
            }
        }

        document.getElementById('throwBtn').addEventListener('click', throwK);
        canvas.addEventListener('dblclick', restartKnife);
        window.addEventListener('keydown', (e) => { if (e.code==='KeyF'||e.key==='f') { e.preventDefault(); throwK(); } if (e.code==='KeyR') restartKnife(); });
        restartKnife();
        function knifeLoop() { if (!gameOver) updateKnife(); drawKnife(); requestAnimationFrame(knifeLoop); }
        knifeLoop();
    })();

    // ----- ФЕРМА (farm) -----
    (function initFarm() {
        const canvas = document.getElementById('farmCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d'); ctx.imageSmoothingEnabled=false;
        const W=550, H=350;
        let grain = 20, carrot = 12, stars = 0;
        let plots = Array(9).fill().map(() => ({ type: null, grow: 0, maxGrow: 100 }));
        let season = 'autumn'; let seasonIdx = 2; const seasonCycle = ['spring','summer','autumn'];

        function updateUI() {
            document.getElementById('grainValue').textContent = grain;
            document.getElementById('carrotValue').textContent = carrot;
            document.getElementById('starValue').textContent = stars;
            let seasonName = {'spring':'🌸 весна','summer':'☀️ лето','autumn':'🍂 осень'};
            document.getElementById('seasonDisplay').textContent = seasonName[season];
        }

        function nextSeason() { seasonIdx = (seasonIdx+1)%3; season = seasonCycle[seasonIdx]; stars += 1; updateUI(); }

        function plant(type) {
            if (type==='grain' && grain<=0) return;
            if (type==='carrot' && carrot<=0) return;
            let idx = plots.findIndex(p => p.type === null);
            if (idx===-1) return;
            if (type==='grain') grain--; else carrot--;
            plots[idx].type = type; plots[idx].grow = 1; updateUI();
        }

        function harvest() {
            let hGrain=0, hCarrot=0;
            for (let p of plots) {
                if (p.type && p.grow >= p.maxGrow) {
                    if (p.type === 'grain') hGrain+=3; else hCarrot+=2;
                    p.type = null; p.grow = 0;
                }
            }
            grain += hGrain; carrot += hCarrot;
            if (hGrain+hCarrot>0) stars+=2;
            nextSeason(); updateUI();
        }

        function growPlants() { for (let p of plots) { if (p.type) { p.grow += 1 + Math.floor(Math.random()*2); if (p.grow>p.maxGrow) p.grow=p.maxGrow; } } }

        function drawFarm() {
            ctx.clearRect(0,0,W,H); ctx.fillStyle='#7b9540'; ctx.fillRect(0,0,W,H);
            for (let r=0; r<3; r++) for (let c=0; c<3; c++) {
                let idx = r*3+c, x=60+c*150, y=40+r*100;
                ctx.fillStyle='#9b6e40'; ctx.fillRect(x,y,130,70);
                ctx.fillStyle='#6d4f2b'; ctx.fillRect(x+5,y+5,120,60);
                ctx.fillStyle='#b48b54'; ctx.fillRect(x+10,y+10,110,50);
                let p = plots[idx];
                if (p.type) {
                    let prog = p.grow/p.maxGrow;
                    let hgt = 10+30*prog;
                    if (p.type==='grain') {
                        ctx.fillStyle='#e5c687'; ctx.fillRect(x+50, y+25-hgt/2, 15, hgt);
                        ctx.fillStyle='#f5e142'; ctx.beginPath(); ctx.arc(x+58, y+20-hgt/2, 12,0,2*Math.PI); ctx.fill();
                    } else {
                        ctx.fillStyle='#f09b5a'; ctx.fillRect(x+55, y+30-hgt/2, 18, hgt);
                        ctx.fillStyle='#fb914b'; ctx.beginPath(); ctx.arc(x+64, y+22-hgt/2,12,0,2*Math.PI); ctx.fill();
                        ctx.fillStyle='#6abe42'; ctx.fillRect(x+60, y+10-hgt/2,4,14);
                    }
                } else { ctx.fillStyle='#5f4c32'; ctx.font='bold 24px monospace'; ctx.fillText('···', x+50, y+45); }
            }
        }

        document.getElementById('plantGrain').addEventListener('click', ()=>plant('grain'));
        document.getElementById('plantCarrot').addEventListener('click', ()=>plant('carrot'));
        document.getElementById('collectBtn').addEventListener('click', harvest);
        canvas.addEventListener('dblclick', ()=>{ grain=20; carrot=12; stars=0; plots.forEach(p=>{p.type=null; p.grow=0;}); season='autumn'; seasonIdx=2; updateUI(); });

        updateUI();
        setInterval(() => { growPlants(); drawFarm(); }, 300);
        drawFarm();
    })();

})();
</script>
</body>
</html>
