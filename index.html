<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Grid Puzzle</title>

<style>

body{
margin:0;
background:#050510;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

#app{
width:420px;
height:720px;
background:#0a0a18;
border-radius:20px;
box-shadow:
0 0 40px #00f7ff,
inset 0 0 20px #0ff;
padding:20px;
display:flex;
flex-direction:column;
}

header{
text-align:center;
font-size:24px;
margin-bottom:10px;
letter-spacing:3px;
color:#00f7ff;
text-shadow:0 0 10px #00f7ff;
}

#grid{
flex:1;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.cell{
background:#0d0d25;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:inset 0 0 10px #000;
transition:0.2s;
}

.cell.active{
background:#00f7ff;
box-shadow:
0 0 10px #00f7ff,
0 0 30px #00f7ff;
}

footer{
text-align:center;
margin-top:10px;
}

button{
background:#00f7ff;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#00cbd1;
}

</style>
</head>

<body>

<div id="app">

<header>NEON GRID</header>

<div id="grid"></div>

<footer>
<button onclick="resetGame()">RESET</button>
</footer>

</div>

<script>

const size = 5
const grid = document.getElementById("grid")

let state = []

function createGrid(){

grid.innerHTML=""
state=[]

for(let i=0;i<size*size;i++){

let val=Math.random()>0.7

state.push(val)

let cell=document.createElement("div")
cell.className="cell"

if(val) cell.classList.add("active")

cell.onclick=()=>toggle(i)

grid.appendChild(cell)

}

}

function toggle(index){

let cells=document.querySelectorAll(".cell")

state[index]=!state[index]

cells[index].classList.toggle("active")

checkWin()

}

function checkWin(){

if(state.every(v=>v)){

setTimeout(()=>{
alert("NETWORK ACTIVATED")
},200)

}

}

function resetGame(){

createGrid()

}

createGrid()

</script>

</body>
</html>
